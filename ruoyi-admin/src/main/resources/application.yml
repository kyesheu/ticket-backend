# 项目相关配置
ruoyi:
  name: Ticket Backend
  version: 1.0.0
  copyrightYear: 2026
  profile: ${UPLOAD_PATH:./uploadPath}
  addressEnabled: false
  captchaType: math

# 服务配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}
    threads:
      max: ${TOMCAT_THREADS_MAX:800}
      min-spare: ${TOMCAT_THREADS_MIN_SPARE:100}

# 日志配置
logging:
  level:
    com.ruoyi: ${LOG_LEVEL_RUOYI:debug}
    com.ruoyi.ticket: ${LOG_LEVEL_TICKET:debug}
    org.springframework: ${LOG_LEVEL_SPRING:warn}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis,ticketAi,ticketSearch
  metrics:
    tags:
      application: ${spring.application.name}

spring:
  application:
    name: ticket-backend

  # 让 Spring Boot 主动读取项目根目录或上一层目录的 .env 文件
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]

  # 国际化资源文件路径
  messages:
    basename: i18n/messages

  # 文件上传
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:20MB}

  # 热部署
  devtools:
    restart:
      enabled: ${DEVTOOLS_RESTART_ENABLED:true}

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      # 主库数据源
      master:
        url: ${DB_URL}
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD}

      # 从库数据源，v1.0 默认不用
      slave:
        enabled: false

      # 连接池配置
      initialSize: ${DRUID_INITIAL_SIZE:5}
      minIdle: ${DRUID_MIN_IDLE:10}
      maxActive: ${DRUID_MAX_ACTIVE:20}
      maxWait: ${DRUID_MAX_WAIT:60000}
      connectTimeout: ${DRUID_CONNECT_TIMEOUT:30000}
      socketTimeout: ${DRUID_SOCKET_TIMEOUT:60000}
      timeBetweenEvictionRunsMillis: ${DRUID_TIME_BETWEEN_EVICTION_RUNS_MILLIS:60000}
      minEvictableIdleTimeMillis: ${DRUID_MIN_EVICTABLE_IDLE_TIME_MILLIS:300000}
      maxEvictableIdleTimeMillis: ${DRUID_MAX_EVICTABLE_IDLE_TIME_MILLIS:900000}

      # 连接检测
      validationQuery: SELECT 1
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false

      # Druid Web 监控
      webStatFilter:
        enabled: ${DRUID_WEB_STAT_ENABLED:true}

      statViewServlet:
        enabled: ${DRUID_STAT_VIEW_ENABLED:true}
        allow: ${DRUID_STAT_ALLOW:}
        url-pattern: /druid/*
        login-username: ${DRUID_STAT_USERNAME:admin}
        login-password: ${DRUID_STAT_PASSWORD}

      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: ${DRUID_SLOW_SQL_MILLIS:1000}
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:10s}
      lettuce:
        pool:
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-wait: ${REDIS_POOL_MAX_WAIT:-1ms}

# 用户配置
user:
  password:
    maxRetryCount: ${USER_PASSWORD_MAX_RETRY_COUNT:5}
    lockTime: ${USER_PASSWORD_LOCK_TIME:10}

# Token 配置
token:
  header: Authorization
  secret: ${TOKEN_SECRET}
  expireTime: ${TOKEN_EXPIRE_TIME:30}

# MyBatis 配置
mybatis:
  typeAliasesPackage: com.ruoyi.**.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper 分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc / Swagger 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_0
    resolve-schema-properties: true
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    tags-sorter: alpha
  info:
    title: 企业工单管理系统接口文档
    version: 1.0.0
    description: Ticket Backend API
  group-configs:
    - group: ticket
      display-name: 工单模块
      paths-to-match: /**
      packages-to-scan: com.ruoyi.ticket.controller
    - group: system
      display-name: 系统管理
      paths-to-match: /**
      packages-to-scan: com.ruoyi.web.controller.system
    - group: monitor
      display-name: 系统监控
      paths-to-match: /**
      packages-to-scan: com.ruoyi.web.controller.monitor
    - group: common
      display-name: 通用接口
      paths-to-match: /**
      packages-to-scan: com.ruoyi.web.controller.common
    - group: generator
      display-name: 代码生成
      paths-to-match: /**
      packages-to-scan: com.ruoyi.generator.controller
    - group: quartz
      display-name: 定时任务
      paths-to-match: /**
      packages-to-scan: com.ruoyi.quartz.controller
    - group: tool
      display-name: 测试工具
      paths-to-match: /**
      packages-to-scan: com.ruoyi.web.controller.tool

# 防盗链配置
referer:
  enabled: false
  allowed-domains: localhost,127.0.0.1

# 防止 XSS 攻击
xss:
  enabled: true
  excludes: ""
  urlPatterns: /system/*,/monitor/*,/ticket/*

# 工单 Elasticsearch 与 AI 功能通过环境变量显式启用。
ticket:
  search:
    enabled: ${TICKET_SEARCH_ENABLED:false}
    uris: ${TICKET_SEARCH_URIS:http://localhost:9200}
    cursor-secret: ${TICKET_SEARCH_CURSOR_SECRET:}
  ai:
    enabled: ${TICKET_AI_ENABLED:false}
    base-url: ${TICKET_AI_BASE_URL:http://127.0.0.1:8090}
    service-token: ${TICKET_AI_SERVICE_TOKEN:}
    connect-timeout: ${TICKET_AI_CONNECT_TIMEOUT:2s}
    read-timeout: ${TICKET_AI_READ_TIMEOUT:10s}
    max-response-bytes: ${TICKET_AI_MAX_RESPONSE_BYTES:1048576}
